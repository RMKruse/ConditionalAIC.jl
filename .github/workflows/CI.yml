name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Gate 1 — formatting (JuliaFormatter, Blue style). Version-independent, one job.
  format:
    name: Format (JuliaFormatter / Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Check Blue-style formatting
        shell: julia --color=yes {0}
        run: |
          using Pkg
          Pkg.activate(; temp=true)
          Pkg.add(PackageSpec(name="JuliaFormatter", version="2.4.0"))
          using JuliaFormatter
          if !format("."; verbose=true)
              @error "Not formatted to the Blue style. Run JuliaFormatter.format(\".\") and commit."
              exit(1)
          end

  # Gates 2 & 3 — JET static analysis and the full test suite (Aqua + @inferred +
  # smoke), run inside `Pkg.test`. No R required. JET runs on Julia 1.12 only: JET
  # 0.11 transitively requires Julia >= 1.12 (via PrecompileTools 1.3.x), so it is
  # uninstallable on the 1.10/1.11 LTS matrix, and no JET release supports prerelease
  # Julia. On every version except 1.12 it is therefore dropped from the test env here
  # and the JET test-item self-skips (see test/quality_tests.jl); 1.12 is the single
  # version that both hosts the JET gate and is a released compiler.
  test:
    name: Test - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1.11', '1.12', 'nightly']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - name: Drop JET from the test env where it is unavailable (everything but 1.12)
        if: ${{ matrix.version != '1.12' }}
        shell: julia --color=yes {0}
        run: |
          using TOML
          path = joinpath("test", "Project.toml")
          proj = TOML.parsefile(path)
          haskey(proj, "deps") && delete!(proj["deps"], "JET")
          haskey(proj, "compat") && delete!(proj["compat"], "JET")
          open(io -> TOML.print(io, proj; sorted=true), path, "w")
          @info "Removed JET from $(path) — JET 0.11 needs Julia >= 1.12 (or this is prerelease)"
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Gated live-R re-validation (issue #7). Separate from the default job:
  # it stands up R, regenerates the Level-1 components, recomputes the reference ρ with
  # live cAIC4, and re-validates `dof_lmm` against it — catching fixture rot. Gated by
  # `CAIC_LIVE_RCALL=1`; runs on pushes to `main`, never in the default no-R path.
  # The R HDF5 reader is `rhdf5` (bundles its own HDF5 via Rhdf5lib); see ADR-0003.
  live-rcall:
    name: Live R re-validation (cAIC4)
    runs-on: ubuntu-latest
    # Push-only: this job builds R + rhdf5 from scratch, far too heavy to run on every
    # PR. Fixture rot is caught post-merge on `main` (and on tags). PRs get the fast,
    # no-R fixture path via the `test` job.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install rhdf5 (bundles HDF5 via Rhdf5lib)
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE)) install.packages("BiocManager")
          BiocManager::install("rhdf5", update = FALSE, ask = FALSE)
      - name: Fetch the pinned cAIC4 v1.1 source (ground truth)
        run: |
          set -e
          ver=1.1
          base=https://cran.r-project.org/src/contrib
          curl -fsSL "$base/cAIC4_${ver}.tar.gz" -o /tmp/cAIC4.tar.gz \
            || curl -fsSL "$base/Archive/cAIC4/cAIC4_${ver}.tar.gz" -o /tmp/cAIC4.tar.gz
          mkdir -p /tmp/caic4 && tar -xzf /tmp/cAIC4.tar.gz -C /tmp/caic4
          echo "CAIC4_SRC=/tmp/caic4/cAIC4" >> "$GITHUB_ENV"
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          CAIC_LIVE_RCALL: '1'

  # Documentation — build the Documenter manual (running every `jldoctest` block in
  # the public docstrings) and deploy it to the `gh-pages` branch. The build runs on
  # every PR to catch doc/doctest breakage; deployment happens only on pushes to
  # `main` and on tags, keyed by the `DOCUMENTER_KEY` deploy secret (the same secret
  # TagBot forwards on release). `GITHUB_TOKEN` lets Documenter post PR doc previews.
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
